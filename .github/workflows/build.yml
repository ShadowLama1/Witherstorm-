name: Build Minecraft Plugin
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          sudo apt-get install unzip
          unzip -o project.zip
          # Verschiebe alle Dateien aus dem entpackten Ordner in das Hauptverzeichnis, falls nötig
          mv project/* . 2>/dev/null || true
          rm project.zip

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build

      - name: Upload Finished JAR
        uses: actions/upload-artifact@v4
        with:
          name: WitherStorm-Plugin-26.1
          path: build/libs/*.jar
